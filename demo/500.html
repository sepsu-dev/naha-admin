<body>
  <div class="error-container">
    <div class="error-icon text-danger animate__animated animate__bounceIn">
      <i class="ph-bold ph-warning-octagon"></i>
    </div>
    <div class="error-code error-500 animate__animated animate__fadeInUp">500</div>
    <h1 class="error-title animate__animated animate__fadeInUp" style="animation-delay: 100ms;">Server Error</h1>
    <p class="error-text animate__animated animate__fadeInUp" style="animation-delay: 200ms;">
      Something went wrong on our end. Our developers have been notified and are looking into it.
    </p>

    <div class="card bg-light border-0 text-start mx-auto mb-4 animate__animated animate__fadeInUp"
      style="max-width: 450px; animation-delay: 250ms;">
      <div class="card-body p-3 font-monospace small text-muted text-break">
        <div class="fw-bold text-dark mb-1">Server Error Details:</div>
        <div><span class="text-danger">Code:</span> ERR_INTERNAL_SERVER_ERROR</div>
        <div><span class="text-danger">Message:</span> Unhandled exception in application logic</div>
        <div><span class="text-danger">Trace ID:</span> trace_8f7e6d5c4b</div>
      </div>
    </div>

    <div class="d-flex justify-content-center gap-3 animate__animated animate__fadeInUp" style="animation-delay: 300ms;">
        <a href="index.html" class="btn btn-primary btn-lg shadow-sm">
            <i class="ph-bold ph-house me-2"></i>Dashboard
        </a>
        <a href="#" onclick="location.reload(); return false;" class="btn btn-light btn-lg shadow-sm">
            <i class="ph-bold ph-arrows-clockwise me-2"></i>Reload Page
        </a>
    </div>

    <div class="mt-5 animate__animated animate__fadeIn" style="animation-delay: 500ms;">
        <p class="small text-muted mb-0">Need help? <a href="#" class="text-primary text-decoration-none">Contact Support</a></p>
    </div>
  </div>

  <script src="../assets/plugins/jquery/jquery.min.js"></script>
  <script src="../assets/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
